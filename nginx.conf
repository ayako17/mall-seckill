worker_processes 1;

events {
    worker_connections 1024;
}

http {
    log_format upstreamlog '[$time_local] $remote_addr - $remote_user - $server_name to: $upstream_addr: $request';
    
    upstream user_service {
        server user-service-1:8080 max_fails=3 fail_timeout=30s;
        server user-service-2:8080 max_fails=3 fail_timeout=30s;
    }

    upstream product_service {
    server product-service:8081 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name localhost;

        access_log /var/log/nginx/access.log upstreamlog;

        location /api/users/ {
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/products/ {
            proxy_pass http://product_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            return 404;
        }
    }
}