global:
  scrape_interval: 15s

scrape_configs:
  - job_name: gateway-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["gateway-service:8088"]

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["user-service-1:8080", "user-service-2:8080"]

  - job_name: product-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["product-service:8081"]

  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["order-service:8084"]

  - job_name: inventory-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["inventory-service:8085"]
