version: '3.8'

services:
  mysql-master:
    image: mysql:8.0
    container_name: mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: seckill_db
      MYSQL_REPLICATION_USER: repl
      MYSQL_REPLICATION_PASSWORD: repl123
    ports:
      - "3306:3306"
    volumes:
      - mysql-master-data:/var/lib/mysql
      - ./mysql-master-init:/docker-entrypoint-initdb.d:ro
      - ./mysql-master-conf:/etc/mysql/conf.d
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
    networks:
      - seckill-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-slave:
    image: mysql:8.0
    container_name: mysql-slave
    environment:
      MYSQL_ROOT_PASSWORD: root123456
    ports:
      - "3307:3306"
    volumes:
      - mysql-slave-data:/var/lib/mysql
      - ./mysql-slave-init:/docker-entrypoint-initdb.d:ro
      - ./mysql-slave-conf:/etc/mysql/conf.d
    command: >
      --server-id=2
      --log-bin=mysql-bin
      --binlog-format=ROW
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
      --relay-log=relay-bin
      --read-only=1
    depends_on:
      - mysql-master
    networks:
      - seckill-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: seckill-redis
    ports:
      - "6379:6379"
    networks:
      - seckill-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    build:
      context: ./elasticsearch
      dockerfile: Dockerfile
    container_name: seckill-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - seckill-net

  kafka:
    image: apache/kafka:3.7.1
    container_name: seckill-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - seckill-net

  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "8848:8848"
      - "9848:9848"
    networks:
      - seckill-net

  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.6
    container_name: sentinel-dashboard
    ports:
      - "8858:8858"
    environment:
      - JAVA_OPTS=-Dserver.port=8858
    networks:
      - seckill-net

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    networks:
      - seckill-net

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - seckill-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.105.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4319:4317"
    depends_on:
      - jaeger
    networks:
      - seckill-net

  user-service-1:
    build:
      context: ./seckill-backend
      dockerfile: user-service/Dockerfile
    container_name: user-service-1
    ports:
      - "8081:8080"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      SENTINEL_DASHBOARD: sentinel-dashboard:8858
      JAVA_TOOL_OPTIONS: "-javaagent:/otel/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: user-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      SPRING_DATASOURCE_MASTER_URL: jdbc:mysql://mysql-master:3306/seckill_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_MASTER_USERNAME: root
      SPRING_DATASOURCE_MASTER_PASSWORD: root123456
      SPRING_DATASOURCE_SLAVE_URL: jdbc:mysql://mysql-slave:3306/seckill_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_SLAVE_USERNAME: root
      SPRING_DATASOURCE_SLAVE_PASSWORD: root123456
    depends_on:
      - nacos
      - redis
      - kafka
      - otel-collector
    volumes:
      - ./observability/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    networks:
      - seckill-net

  user-service-2:
    build:
      context: ./seckill-backend
      dockerfile: user-service/Dockerfile
    container_name: user-service-2
    ports:
      - "8082:8080"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      SENTINEL_DASHBOARD: sentinel-dashboard:8858
      JAVA_TOOL_OPTIONS: "-javaagent:/otel/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: user-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      SPRING_DATASOURCE_MASTER_URL: jdbc:mysql://mysql-master:3306/seckill_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_MASTER_USERNAME: root
      SPRING_DATASOURCE_MASTER_PASSWORD: root123456
      SPRING_DATASOURCE_SLAVE_URL: jdbc:mysql://mysql-slave:3306/seckill_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_SLAVE_USERNAME: root
      SPRING_DATASOURCE_SLAVE_PASSWORD: root123456
    depends_on:
      - nacos
      - redis
      - kafka
      - otel-collector
    volumes:
      - ./observability/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    networks:
      - seckill-net

  product-service:
    build:
      context: ./seckill-backend
      dockerfile: product-service/Dockerfile
    container_name: product-service
    ports:
      - "8083:8081"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      SENTINEL_DASHBOARD: sentinel-dashboard:8858
      JAVA_TOOL_OPTIONS: "-javaagent:/otel/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: product-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    depends_on:
      - nacos
      - redis
      - kafka
      - elasticsearch
      - otel-collector
    volumes:
      - ./observability/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    networks:
      - seckill-net

  order-service:
    build:
      context: ./seckill-backend
      dockerfile: order-service/Dockerfile
    container_name: order-service
    ports:
      - "8084:8084"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      SENTINEL_DASHBOARD: sentinel-dashboard:8858
      JAVA_TOOL_OPTIONS: "-javaagent:/otel/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: order-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      ORDER_BASE_DB_URL: jdbc:mysql://mysql-master:3306/seckill_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      ORDER_BASE_DB_USERNAME: root
      ORDER_BASE_DB_PASSWORD: root123456
      ORDER_DS0_URL: jdbc:mysql://mysql-master:3306/seckill_order_0?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      ORDER_DS0_USERNAME: root
      ORDER_DS0_PASSWORD: root123456
      ORDER_DS1_URL: jdbc:mysql://mysql-master:3306/seckill_order_1?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      ORDER_DS1_USERNAME: root
      ORDER_DS1_PASSWORD: root123456
      ORDER_DS2_URL: jdbc:mysql://mysql-master:3306/seckill_order_2?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      ORDER_DS2_USERNAME: root
      ORDER_DS2_PASSWORD: root123456
      ORDER_DS3_URL: jdbc:mysql://mysql-master:3306/seckill_order_3?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      ORDER_DS3_USERNAME: root
      ORDER_DS3_PASSWORD: root123456
    depends_on:
      - nacos
      - redis
      - kafka
      - otel-collector
    volumes:
      - ./observability/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    networks:
      - seckill-net

  inventory-service:
    build:
      context: ./seckill-backend
      dockerfile: inventory-service/Dockerfile
    container_name: inventory-service
    ports:
      - "8085:8085"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      SENTINEL_DASHBOARD: sentinel-dashboard:8858
      JAVA_TOOL_OPTIONS: "-javaagent:/otel/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: inventory-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      INVENTORY_DB_URL: jdbc:mysql://mysql-master:3306/seckill_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      INVENTORY_DB_USERNAME: root
      INVENTORY_DB_PASSWORD: root123456
    depends_on:
      - nacos
      - redis
      - kafka
      - otel-collector
    volumes:
      - ./observability/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    networks:
      - seckill-net

  gateway-service:
    build:
      context: ./seckill-backend
      dockerfile: gateway-service/Dockerfile
    container_name: gateway-service
    ports:
      - "8088:8088"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      SENTINEL_DASHBOARD: sentinel-dashboard:8858
      JAVA_TOOL_OPTIONS: "-javaagent:/otel/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: gateway-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    depends_on:
      - nacos
      - user-service-1
      - user-service-2
      - product-service
      - order-service
      - inventory-service
      - otel-collector
    volumes:
      - ./observability/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    networks:
      - seckill-net

  nginx:
    image: nginx:alpine
    container_name: seckill-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-html:/usr/share/nginx/html:ro
    depends_on:
      - gateway-service
    networks:
      - seckill-net

networks:
  seckill-net:
    driver: bridge

volumes:
  mysql-master-data:
  mysql-slave-data:
  es-data:
  kafka-data:
  prometheus-data:
