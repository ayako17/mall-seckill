version: '3.8'

services:
  # ==================== MySQL 主库 ====================
  mysql-master:
    image: mysql:8.0
    container_name: mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: seckill_db
      MYSQL_REPLICATION_USER: repl
      MYSQL_REPLICATION_PASSWORD: repl123
    ports:
      - "3306:3306"
    volumes:
      - mysql-master-data:/var/lib/mysql
      - ./mysql-master-init:/docker-entrypoint-initdb.d:ro
      - ./mysql-master-conf:/etc/mysql/conf.d
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
    networks:
      - seckill-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== MySQL 从库 ====================
  mysql-slave:
    image: mysql:8.0
    container_name: mysql-slave
    environment:
      MYSQL_ROOT_PASSWORD: root123456
    ports:
      - "3307:3306"
    volumes:
      - mysql-slave-data:/var/lib/mysql
      - ./mysql-slave-init:/docker-entrypoint-initdb.d:ro
      - ./mysql-slave-conf:/etc/mysql/conf.d
    command: >
      --server-id=2
      --log-bin=mysql-bin
      --binlog-format=ROW
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
      --relay-log=relay-bin
      --read-only=1
    depends_on:
      - mysql-master
    networks:
      - seckill-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: seckill-redis
    ports:
      - "6379:6379"
    networks:
      - seckill-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== ElasticSearch ====================
  elasticsearch:
    build: 
      context: ./elasticsearch
      dockerfile: Dockerfile
    container_name: seckill-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - seckill-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ==================== Kafka ====================
  kafka:
    image: apache/kafka:3.7.1
    container_name: seckill-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - seckill-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ==================== 订单服务 ====================
  order-service:
    build:
      context: ./seckill-backend
      dockerfile: order-service/Dockerfile
    container_name: order-service
    ports:
      - "8084:8084"
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      ORDER_BASE_DB_URL: jdbc:mysql://mysql-master:3306/seckill_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      ORDER_BASE_DB_USERNAME: root
      ORDER_BASE_DB_PASSWORD: root123456
      ORDER_DS0_URL: jdbc:mysql://mysql-master:3306/seckill_order_0?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      ORDER_DS0_USERNAME: root
      ORDER_DS0_PASSWORD: root123456
      ORDER_DS1_URL: jdbc:mysql://mysql-master:3306/seckill_order_1?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      ORDER_DS1_USERNAME: root
      ORDER_DS1_PASSWORD: root123456
      ORDER_DS2_URL: jdbc:mysql://mysql-master:3306/seckill_order_2?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      ORDER_DS2_USERNAME: root
      ORDER_DS2_PASSWORD: root123456
      ORDER_DS3_URL: jdbc:mysql://mysql-master:3306/seckill_order_3?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      ORDER_DS3_USERNAME: root
      ORDER_DS3_PASSWORD: root123456
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - seckill-net
    restart: on-failure

  # ==================== 用户服务（实例1）====================
  user-service-1:
    build:
      context: ./seckill-backend
      dockerfile: user-service/Dockerfile
    container_name: user-service-1
    ports:
      - "8081:8080"
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      # 主库（写）
      SPRING_DATASOURCE_MASTER_URL: jdbc:mysql://mysql-master:3306/seckill_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_MASTER_USERNAME: root
      SPRING_DATASOURCE_MASTER_PASSWORD: root123456
      # 从库（读）
      # ✅ Fix in user-service-1, user-service-2, and product-service:
      SPRING_DATASOURCE_SLAVE_URL: jdbc:mysql://mysql-slave:3306/seckill_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_SLAVE_PASSWORD: root123456
      SPRING_DATASOURCE_SLAVE_USERNAME: root
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: seckillSecretKey2026
    networks:
      - seckill-net

  # 用户服务实例2（配置相同，略）
  user-service-2:
    # ... 同 user-service-1
    build:
      context: ./seckill-backend
      dockerfile: user-service/Dockerfile
    container_name: user-service-2
    ports:
      - "8082:8080"
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_MASTER_URL: jdbc:mysql://mysql-master:3306/seckill_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_MASTER_USERNAME: root
      SPRING_DATASOURCE_MASTER_PASSWORD: root123456
      # ✅ Fix in user-service-1, user-service-2, and product-service:
      SPRING_DATASOURCE_SLAVE_URL: jdbc:mysql://mysql-slave:3306/seckill_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_SLAVE_USERNAME: root
      SPRING_DATASOURCE_SLAVE_PASSWORD: root123456
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: seckillSecretKey2026
    networks:
      - seckill-net

  # 商品服务（配置相同）
  product-service:
    restart: on-failure
    # ... 同 user-service-1
    build:
      context: ./seckill-backend
      dockerfile: product-service/Dockerfile
    container_name: product-service
    ports:
      - "8083:8081"
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_MASTER_URL: jdbc:mysql://mysql-master:3306/seckill_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_MASTER_USERNAME: root
      SPRING_DATASOURCE_MASTER_PASSWORD: root123456
      # ✅ Fix in user-service-1, user-service-2, and product-service:
      SPRING_DATASOURCE_SLAVE_URL: jdbc:mysql://mysql-slave:3306/seckill_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_SLAVE_USERNAME: root
      SPRING_DATASOURCE_SLAVE_PASSWORD: root123456
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    networks:
      - seckill-net

  # ==================== Nginx ====================
  nginx:
    image: nginx:alpine
    container_name: seckill-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-html:/usr/share/nginx/html:ro
    depends_on:
      - user-service-1
      - user-service-2
      - product-service
      - order-service
    networks:
      - seckill-net
    
networks:
  seckill-net:
    driver: bridge

volumes:
  mysql-master-data:
  mysql-slave-data:
  es-data:
  kafka-data:
