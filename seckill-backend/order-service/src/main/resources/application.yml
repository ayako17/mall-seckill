server:
  port: 8084

spring:
  application:
    name: order-service

  threads:
    virtual:
      enabled: true

  data:
    redis:
      host: redis
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 5000ms

  kafka:
    bootstrap-servers: kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      group-id: order-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: manual_immediate

  shardingsphere:
    props:
      sql-show: true
    datasource:
      names: base,ds0,ds1,ds2,ds3
      base:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: ${ORDER_BASE_DB_URL:jdbc:mysql://mysql-master:3306/seckill_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
        username: ${ORDER_BASE_DB_USERNAME:root}
        password: ${ORDER_BASE_DB_PASSWORD:root123456}
      ds0:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: ${ORDER_DS0_URL:jdbc:mysql://mysql-master:3306/seckill_order_0?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
        username: ${ORDER_DS0_USERNAME:root}
        password: ${ORDER_DS0_PASSWORD:root123456}
      ds1:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: ${ORDER_DS1_URL:jdbc:mysql://mysql-master:3306/seckill_order_1?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
        username: ${ORDER_DS1_USERNAME:root}
        password: ${ORDER_DS1_PASSWORD:root123456}
      ds2:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: ${ORDER_DS2_URL:jdbc:mysql://mysql-master:3306/seckill_order_2?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
        username: ${ORDER_DS2_USERNAME:root}
        password: ${ORDER_DS2_PASSWORD:root123456}
      ds3:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: ${ORDER_DS3_URL:jdbc:mysql://mysql-master:3306/seckill_order_3?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
        username: ${ORDER_DS3_USERNAME:root}
        password: ${ORDER_DS3_PASSWORD:root123456}

    rules:
      sharding:
        tables:
          orders:
            actual-data-nodes: ds$->{0..3}.orders_$->{0..7}
            database-strategy:
              standard:
                sharding-column: user_id
                sharding-algorithm-name: user-db-hash-mod
            table-strategy:
              standard:
                sharding-column: id
                sharding-algorithm-name: order-table-inline
            key-generate-strategy:
              column: id
              key-generator-name: order-snowflake
        sharding-algorithms:
          user-db-hash-mod:
            type: HASH_MOD
            props:
              sharding-count: 4
          order-table-inline:
            type: INLINE
            props:
              algorithm-expression: orders_$->{id % 8}
        key-generators:
          order-snowflake:
            type: SNOWFLAKE
      single:
        tables:
          - base.seckill_product

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: seckillSecretKey2026

logging:
  level:
    com.seckill: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} - %msg%n'
