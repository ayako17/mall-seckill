server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: user-service
  threads:
    virtual:
      enabled: true
  
  # ShardingSphere 读写分离配置
  shardingsphere:
    datasource:
      names: master,slave
      # 主库（写库）
      master:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: ${SPRING_DATASOURCE_MASTER_URL:jdbc:mysql://mysql-master:3306/seckill_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
        username: ${SPRING_DATASOURCE_MASTER_USERNAME:root}
        password: ${SPRING_DATASOURCE_MASTER_PASSWORD:root123456}
        hikari:
          maximum-pool-size: 20
      # 从库（读库）
      slave:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: ${SPRING_DATASOURCE_SLAVE_URL:jdbc:mysql://mysql-slave:3307/seckill_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
        username: ${SPRING_DATASOURCE_SLAVE_USERNAME:root}
        password: ${SPRING_DATASOURCE_SLAVE_PASSWORD:root123456}
        hikari:
          maximum-pool-size: 50
    rules:
      readwrite-splitting:
        data-sources:
          myds:
            type: Static
            props:
              write-data-source-name: master
              read-data-source-names: slave
            load-balancer-name: round-robin
        load-balancers:
          round-robin:
            type: ROUND_ROBIN
    props:
      sql-show: true  # 开启 SQL 日志，方便调试

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

# JWT配置（需要启用）
jwt:
  secret: seckillSecretKey2026
  expiration: 86400

logging:
  level:
    com.seckill: DEBUG
    org.springframework.jdbc: DEBUG
    org.springframework.transaction: DEBUG
    org.apache.shardingsphere: INFO