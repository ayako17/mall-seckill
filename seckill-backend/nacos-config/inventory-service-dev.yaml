# Data ID: inventory-service-dev.yaml
server:
  port: 8085

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${INVENTORY_DB_URL:jdbc:mysql://mysql-master:3306/seckill_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${INVENTORY_DB_USERNAME:root}
    password: ${INVENTORY_DB_PASSWORD:root123456}
  data:
    redis:
      host: redis
      port: 6379
      password:
      database: 0
      timeout: 5000ms
  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: inventory-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  cloud:
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:sentinel-dashboard:8858}
      datasource:
        inventory-degrade-nacos:
          nacos:
            server-addr: ${NACOS_SERVER_ADDR:nacos:8848}
            namespace: ${NACOS_NAMESPACE:public}
            group-id: DEFAULT_GROUP
            data-id: inventory-service-degrade-rules.json
            data-type: json
            rule-type: degrade

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false

app:
  kafka:
    topic:
      order-paid: order.paid
      inventory-reserve: inventory.reserve
      inventory-reserve-result: inventory.reserve.result

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  level:
    com.seckill: DEBUG
